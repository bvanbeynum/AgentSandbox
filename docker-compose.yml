services:
  # Shared base for all agents
  base-agent: &base-agent
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app                # Mount source code
      - /app/node_modules     # Keep node_modules internal to container
      - ./workspace:/app/workspace # Shared code output folder
      - /home/bvanbeynum/dev/agentSandbox:/app/projects # Shared projects folder

  business-analyst:
    <<: *base-agent
    container_name: ba_agent
    command: ["node", "baAgent.js"]

  software-architect:
    <<: *base-agent
    container_name: sa_agent
    command: ["node", "softwareArchitectAgent.js"]
  
  database-architect:
    <<: *base-agent
    container_name: db_agent
    command: ["node", "dbArchitectureAgent.js"]

  network-architect:
    <<: *base-agent
    container_name: network_agent
    command: ["node", "networkAgent.js"]

  project-setup-agent:
    <<: *base-agent
    container_name: project_setup_agent
    command: ["node", "projectSetupAgent.js"]

  node-developer:
    <<: *base-agent
    container_name: node_agent
    command: ["node", "nodeAgent.js"]
